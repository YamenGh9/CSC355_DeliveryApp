<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Deliveroo</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <main>
      <section>
        <form method="POST" action="/auth/login">
          <label
            >Email Address:
            <input
              placeholder="Email Address"
              type="email"
              name="userEmail"
              required
            />
          </label>
          <label
            >Password:
            <input
              placeholder="Password"
              type="password"
              name="password"
              required
            />
          </label>
          <button type="submit">Log in</button>
        </form>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: #777; text-align: center;">
          Not registered? <a href="/register" style="color: #00ccbc;">Register here</a>
        </p>
      </section>
    </main>
  </body>
</html>
