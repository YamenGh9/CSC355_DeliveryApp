<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Deliveroo</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <main>
      <h1 style="margin-bottom: 2rem; font-size: 1.8rem; color: #111; text-align: center;">Welcome to Deliveroo</h1>
      <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div style="background: #f9f9f9; padding: 1.5rem; border-radius: 8px; text-align: center;">
          <h2 style="margin-bottom: 1rem; font-size: 1.2rem; color: #111;">Customer</h2>
          <a href="/login" style="display: inline-block; margin-right: 1rem; padding: 0.5rem 1rem; background: #00ccbc; color: white; text-decoration: none; border-radius: 4px;">Login</a>
          <a href="/register" style="display: inline-block; padding: 0.5rem 1rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">Register</a>
        </div>
        <div style="background: #f9f9f9; padding: 1.5rem; border-radius: 8px; text-align: center;">
          <h2 style="margin-bottom: 1rem; font-size: 1.2rem; color: #111;">Courier</h2>
          <a href="/courrier/login" style="display: inline-block; margin-right: 1rem; padding: 0.5rem 1rem; background: #00ccbc; color: white; text-decoration: none; border-radius: 4px;">Login</a>
          <a href="/courrier/register" style="display: inline-block; padding: 0.5rem 1rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">Register</a>
        </div>
        <div style="background: #f9f9f9; padding: 1.5rem; border-radius: 8px; text-align: center;">
          <h2 style="margin-bottom: 1rem; font-size: 1.2rem; color: #111;">Restaurant</h2>
          <a href="/restaurant/login" style="display: inline-block; margin-right: 1rem; padding: 0.5rem 1rem; background: #00ccbc; color: white; text-decoration: none; border-radius: 4px;">Login</a>
          <a href="/restaurant/register" style="display: inline-block; padding: 0.5rem 1rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">Register</a>
        </div>
      </div>
    </main>
  </body>
</html>
